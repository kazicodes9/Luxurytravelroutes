<!DOCTYPE html>
<html>
<head>
    <title>{{name}}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

<!-- HEADER -->
<header>
    <h2 class="logo">LuxuryTravelRoutes</h2>
  <nav>
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('destinations_page') }}">Destinations</a>
        <a href="{{ url_for('visa') }}">Worldwide Visa</a>
        <a href="{{ url_for('about') }}">About Us</a>
        <a href="{{ url_for('contact') }}">Contact Us</a>
    </nav>
</header>
<!-- VIDEO HERO -->
<section class="hero-video">

    <video autoplay muted loop>
        <source src="/static/videos/{{ video }}" type="video/mp4">
    </video>

    <h1>Welcome to {{ name }}</h1>

</section>

<!-- PACKAGES -->
<section class="packages">
    <h2>{{name}} Packages</h2>

    <div class="cards">
        <div class="card">
            <p style="padding:20px;">Packages coming soon for {{name}}</p>
        </div>
    </div>
</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 Travel Agency | All Rights Reserved</p>
</footer>

<script src="/static/js/script.js"></script>

</body>
</html>
